<!DOCTYPE html>
<html>
<head>
    <title>My Events</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="container mt-4">

<h2>My Registered Events</h2>

<table class="table">

<tr>
    <th>Title</th>
    <th>Venue</th>
    <th>Date</th>
</tr>

{% for event in events %}

<tr>
    <td>{{ event.title }}</td>
    <td>{{ event.venue }}</td>
    <td>{{ event.date }}</td>
</tr>

{% endfor %}

</table>

</body>
</html>
