<!DOCTYPE html>
<html>
<head>
    <title>Create Task</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="container mt-4">

<h2>Assign Task</h2>

<form method="post">

<input name="title" class="form-control mb-2" placeholder="Task Title">

<textarea name="description" class="form-control mb-2" placeholder="Description"></textarea>

<select name="event_id" class="form-control mb-2">

    {% for event in events %}
    <option value="{{ event.id }}">{{ event.title }}</option>
    {% endfor %}

</select>

<select name="volunteer_id" class="form-control mb-2">

    {% for v in volunteers %}
    <option value="{{ v.id }}">{{ v.name }}</option>
    {% endfor %}

</select>

<button class="btn btn-success">Assign Task</button>

</form>

</body>
</html>
