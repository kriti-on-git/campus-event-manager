<!DOCTYPE html>
<html>
<head>
<title>Login</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="container mt-5">

<h2>Login</h2>

<form method="post">

<input
class="form-control mb-3"
name="email"
placeholder="Email">

<input
class="form-control mb-3"
type="password"
name="password"
placeholder="Password">

<button class="btn btn-success">
Login
</button>

</form>

<br>

<a href="/register">
Register
</a>

</body>
</html>
