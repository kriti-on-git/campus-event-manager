<!DOCTYPE html>
<html>
<head>
    <title>Tasks</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="container mt-4">

<h2>Tasks</h2>

{% if user.role == "admin" %}
<a href="/tasks/create" class="btn btn-primary mb-3">
    Assign Task
</a>
{% endif %}

<table class="table table-bordered">

<tr>
    <th>Title</th>
    <th>Status</th>
    <th>Volunteer</th>
    <th>Action</th>
</tr>

{% for task in tasks %}

<tr>
    <td>{{ task.title }}</td>
    <td>{{ task.status }}</td>
    <td>{{ task.volunteer_id }}</td>

    <td>

    {% if user.role == "volunteer" and task.volunteer_id == user.id %}

        <a href="/tasks/update/{{ task.id }}/In Progress" class="btn btn-warning btn-sm">Start</a>
        <a href="/tasks/update/{{ task.id }}/Completed" class="btn btn-success btn-sm">Done</a>

    {% endif %}

    </td>
</tr>

{% endfor %}

</table>

</body>
</html>
